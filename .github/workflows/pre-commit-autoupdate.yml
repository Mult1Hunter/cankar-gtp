name: pre-commit autoupdate

on:
  schedule:
    - cron: "17 6 1 * *" # monthly, 1st at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx pre-commit autoupdate
      - uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/pre-commit-autoupdate
          title: "CHORE: pre-commit autoupdate"
          commit-message: "CHORE: pre-commit autoupdate"
          body: >
            Automated monthly bump of pre-commit hook revs
            (keeps hook versions from forking away from pyproject dev deps).
            CI must pass before merge.
          labels: dependencies
